name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build
        run: mvn package -DskipTests -q

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: vuln-test-jar
          path: target/vuln-test-1.0.jar
